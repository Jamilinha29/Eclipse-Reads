name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ================================
  # INSTALL & TEST ROOT (VITEST)
  # ================================
  root-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install backend deps for fault-tolerance tests
        run: npm run install:backends

      - name: Run root tests
        run: npm test

  # ================================
  # INSTALL & TEST FRONTEND
  # ================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test --if-present

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

  # ================================
  # BACKEND MICROSERVICES TESTS
  # ================================
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [books-api, auth-proxy, library-service]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/backend/${{ matrix.service }}
          npm ci

      - name: TypeScript check
        run: |
          cd services/backend/${{ matrix.service }}
          npm run build

  # ================================
  # DOCKER BUILD (CI) — apenas push em main (evita push de imagens em PR)
  # ================================
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend, root-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & Push Books API
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/books-api:latest"
          IMAGE_LOWER=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_LOWER ./services/backend/books-api
          docker push $IMAGE_LOWER

      - name: Build & Push Auth Proxy
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/auth-proxy:latest"
          IMAGE_LOWER=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_LOWER ./services/backend/auth-proxy
          docker push $IMAGE_LOWER

      - name: Build & Push Library Service
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/library-service:latest"
          IMAGE_LOWER=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_LOWER ./services/backend/library-service
          docker push $IMAGE_LOWER

  # ================================
  # DEPLOY TO VERCEL — raiz do repo (api/* + vercel.json + build do frontend)
  # Não use working-directory: frontend: isso publica só o SPA e perde as rotas serverless.
  # ================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [frontend, backend, root-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

